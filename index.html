<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Análise Diária — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #F4F6F9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-wrapper {
      width: 100%;
      max-width: 420px;
      padding: 24px 16px;
    }

    .logo-area {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-area .logo-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #2980b9, #1a5f7a);
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
      box-shadow: 0 4px 14px rgba(41,128,185,0.35);
    }

    .logo-area .logo-icon svg {
      width: 30px;
      height: 30px;
      fill: none;
      stroke: #fff;
      stroke-width: 1.8;
    }

    .logo-area h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a2e;
      letter-spacing: -0.3px;
    }

    .logo-area p {
      font-size: 13px;
      color: #888;
      margin-top: 4px;
    }

    .card {
      background: #ffffff;
      border-radius: 14px;
      padding: 32px 28px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    .card h2 {
      font-size: 17px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 6px;
    }

    .card .subtitle {
      font-size: 13px;
      color: #888;
      margin-bottom: 26px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 7px;
    }

    .form-group input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      font-family: Arial, sans-serif;
      color: #1a1a2e;
      background: #fafafa;
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }

    .form-group input:focus {
      border-color: #2980b9;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(41,128,185,0.12);
    }

    .form-group .password-wrap {
      position: relative;
    }

    .form-group .password-wrap input {
      padding-right: 44px;
    }

    .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #aaa;
      background: none;
      border: none;
      padding: 4px;
      display: flex;
      align-items: center;
    }

    .toggle-pw:hover { color: #2980b9; }
    .toggle-pw svg { width: 18px; height: 18px; }

    .forgot {
      display: block;
      text-align: right;
      font-size: 12px;
      color: #2980b9;
      text-decoration: none;
      margin-top: 6px;
    }

    .forgot:hover { text-decoration: underline; }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #2980b9, #1a5f7a);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      font-family: Arial, sans-serif;
      cursor: pointer;
      margin-top: 22px;
      transition: opacity .2s, transform .1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-login:hover { opacity: 0.92; }
    .btn-login:active { transform: scale(0.98); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

    .btn-login .spin {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }

    .btn-login.loading .spin { display: block; }
    .btn-login.loading .btn-text { opacity: 0.7; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      display: none;
      background: #fdf2f2;
      border: 1px solid #f5c6c6;
      color: #c0392b;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-top: 14px;
      text-align: center;
    }

    .error-msg.visible { display: block; }

    .footer-note {
      text-align: center;
      font-size: 12px;
      color: #aaa;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<div class="login-wrapper">

  <div class="logo-area">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M3 13.5l4-4 4 4 4-6 4 3"/>
        <rect x="3" y="3" width="18" height="18" rx="2" stroke-linecap="round"/>
      </svg>
    </div>
    <h1>Análise Diária</h1>
    <p>Resultados e atingimentos em tempo real</p>
  </div>

  <div class="card">
    <h2>Bem-vindo</h2>
    <p class="subtitle">Entre com seu e-mail e senha para continuar</p>

    <form id="form-login" novalidate>
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" id="inp-email" placeholder="seu@email.com" autocomplete="email" required />
      </div>

      <div class="form-group">
        <label>Senha</label>
        <div class="password-wrap">
          <input type="password" id="inp-senha" placeholder="••••••••" autocomplete="current-password" required />
          <button type="button" class="toggle-pw" id="btn-toggle-pw" tabindex="-1">
            <svg id="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <a href="#" class="forgot" id="link-forgot">Esqueceu a senha?</a>
      </div>

      <button type="submit" class="btn-login" id="btn-login">
        <div class="spin"></div>
        <span class="btn-text">Entrar</span>
      </button>

      <div class="error-msg" id="error-msg"></div>
    </form>
  </div>

  <p class="footer-note">Acesso restrito a usuários autorizados</p>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  // ── Configuração Firebase ─────────────────────────────────────────────────
  // Substitua pelos valores do seu projeto em:
  // Firebase Console → Project Settings → General → Your apps → Web app
  const firebaseConfig = {
    apiKey:            "AIzaSyB3s2ZQ-fC-YgIFXXXl7i9AjsiufK6ZnRY",
    authDomain:        "projeto-paulo-d5ac4.firebaseapp.com",
    projectId:         "projeto-paulo-d5ac4",
    storageBucket:     "projeto-paulo-d5ac4.firebasestorage.app",
    messagingSenderId: "844667053328",
    appId:             "1:844667053328:web:716d64598f5c396e777195",
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // ── Helpers ───────────────────────────────────────────────────────────────
  const $  = id => document.getElementById(id);
  const showError = msg => {
    $('error-msg').textContent = msg;
    $('error-msg').classList.add('visible');
  };
  const hideError = () => $('error-msg').classList.remove('visible');

  const setLoading = on => {
    $('btn-login').disabled = on;
    $('btn-login').classList.toggle('loading', on);
  };

  // ── Toggle senha visível ──────────────────────────────────────────────────
  $('btn-toggle-pw').addEventListener('click', () => {
    const inp = $('inp-senha');
    const isText = inp.type === 'text';
    inp.type = isText ? 'password' : 'text';
    $('icon-eye').innerHTML = isText
      ? `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`
      : `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
         <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
         <line x1="1" y1="1" x2="23" y2="23"/>`;
  });

  // ── Submit login ──────────────────────────────────────────────────────────
  $('form-login').addEventListener('submit', async e => {
    e.preventDefault();
    hideError();

    const email = $('inp-email').value.trim();
    const senha = $('inp-senha').value;

    if (!email || !senha) {
      showError('Preencha o e-mail e a senha.');
      return;
    }

    setLoading(true);
    try {
      await signInWithEmailAndPassword(auth, email, senha);
      window.location.href = 'dashboard.html';
    } catch (err) {
      const msgs = {
        'auth/invalid-email':        'E-mail inválido.',
        'auth/user-not-found':       'Usuário não encontrado.',
        'auth/wrong-password':       'Senha incorreta.',
        'auth/invalid-credential':   'E-mail ou senha incorretos.',
        'auth/too-many-requests':    'Muitas tentativas. Aguarde alguns minutos.',
        'auth/user-disabled':        'Usuário desativado. Contate o administrador.',
        'auth/network-request-failed': 'Erro de conexão. Verifique sua internet.',
      };
      showError(msgs[err.code] || `Erro: ${err.message}`);
    } finally {
      setLoading(false);
    }
  });

  // ── Esqueceu a senha ──────────────────────────────────────────────────────
  $('link-forgot').addEventListener('click', async e => {
    e.preventDefault();
    const email = $('inp-email').value.trim();
    if (!email) {
      showError('Digite seu e-mail acima para recuperar a senha.');
      return;
    }
    try {
      await sendPasswordResetEmail(auth, email);
      hideError();
      $('error-msg').style.background = '#eafaf1';
      $('error-msg').style.borderColor = '#a9dfbf';
      $('error-msg').style.color = '#1e8449';
      $('error-msg').textContent = `E-mail de recuperação enviado para ${email}.`;
      $('error-msg').classList.add('visible');
    } catch (err) {
      showError('Não foi possível enviar o e-mail de recuperação.');
    }
  });
</script>
</body>
</html>
